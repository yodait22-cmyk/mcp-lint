name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    name: Build & Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  lint-fixtures:
    name: mcp-lint check (fixtures)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check valid fixtures (expect 0 errors)
        run: node dist/index.js check tests/fixtures/valid/minimal-tool.json --format terminal

      - name: Check invalid fixtures (expect errors, exit 1 is OK)
        run: node dist/index.js check tests/fixtures/invalid/mixed-issues.json --format terminal || true

      - name: Output JSON report for invalid fixtures
        run: node dist/index.js check tests/fixtures/invalid/mixed-issues.json --format json || true

      - name: Post Markdown summary
        run: |
          echo "## mcp-lint report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### valid/minimal-tool.json" >> $GITHUB_STEP_SUMMARY
          node dist/index.js check tests/fixtures/valid/minimal-tool.json --format markdown >> $GITHUB_STEP_SUMMARY || true
          echo "### invalid/mixed-issues.json" >> $GITHUB_STEP_SUMMARY
          node dist/index.js check tests/fixtures/invalid/mixed-issues.json --format markdown >> $GITHUB_STEP_SUMMARY || true
